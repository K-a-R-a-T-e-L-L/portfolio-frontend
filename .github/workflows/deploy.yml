name: Build and Deploy Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: portfolio-frontend

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required CI variables
        run: |
          test -n "${{ vars.NEXT_PUBLIC_SITE_URL }}" || (echo "Missing vars.NEXT_PUBLIC_SITE_URL" && exit 1)
          test -n "${{ vars.NEXT_PUBLIC_API_URL }}" || (echo "Missing vars.NEXT_PUBLIC_API_URL" && exit 1)

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            OPENAPI_PATH=${{ vars.OPENAPI_PATH }}
            API_DOCS_URL=${{ vars.API_DOCS_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ vars.GHCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ vars.GHCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Dokploy deploy
        run: |
          curl -X POST "${{ vars.DOKPLOY_URL }}/api/application.deploy" \
            -H "accept: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ secrets.DOKPLOY_APPLICATION_ID }}\"}"
